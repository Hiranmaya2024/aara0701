<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaradhya Order App</title><style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }

/* Header */
.header {
  position: sticky;
  top: 0;
  background: white;
  padding: 10px;
  z-index: 1000;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* Product Card */
.item {
  background: white;
  margin: 10px;
  padding: 12px;
  border-radius: 12px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.mrp { color: #888; font-size: 13px; }

.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.controls button {
  padding: 6px 12px;
  font-size: 16px;
}

.qty {
  font-weight: bold;
}

/* Grid */
@media (min-width:768px){
  #list {
    display: grid;
    grid-template-columns: repeat(2,1fr);
  }
}
@media (min-width:1024px){
  #list {
    grid-template-columns: repeat(3,1fr);
  }
}

/* Cart Bar */
.cart-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #28a745;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cart-bar button {
  background: white;
  color: #28a745;
  border: none;
  padding: 10px;
  border-radius: 8px;
}
</style></head>
<body><div class="header">
  <h3>Aaradhya Pharmaceuticals</h3>  <input type="text" id="shop" placeholder="Shop Name">
  <input type="text" id="mobile" placeholder="Mobile Number">  <input type="text" id="search" placeholder="Search..." onkeyup="filterItems()">  <select id="companyFilter" onchange="filterItems()">
    <option value="">All Companies</option>
  </select>
</div><div id="list">Loading...</div><div class="cart-bar">
  <div id="cartInfo">0 items | ₹0</div>
  <button onclick="sendOrder()">Checkout</button>
</div><script>

let products = [];
let filtered = [];
let cart = {};

let visibleCount = 10;
const loadStep = 10;

const CSV_URL = "https://docs.google.com/spreadsheets/d/1OlY-BMsluyLrGD1lpv9dKa2rRKFhl1Q9/export?format=csv";

// Load data
fetch(CSV_URL)
.then(res => res.text())
.then(csv => {

  const rows = csv.split("\n").map(r => r.split(","));

  products = rows.slice(1).map((r,i) => ({
    id: i,
    name: (r[0] || "").trim(),
    pack: (r[1] || "").trim(),
    mrp: parseFloat(r[3]) || 0,
    rate: parseFloat(r[4]) || 0,
    company: (r[5] || "").trim()
  }))
  .filter(p => p.name !== "");

  filtered = products;

  populateCompanyFilter();
  renderList();
});


// Company filter
function populateCompanyFilter(){
  let companies = [...new Set(products.map(p => p.company))];
  let select = document.getElementById("companyFilter");

  companies.forEach(c=>{
    let opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    select.appendChild(opt);
  });
}


// Filter
function filterItems(){
  let s = document.getElementById("search").value.toLowerCase();
  let company = document.getElementById("companyFilter").value;

  filtered = products.filter(p =>
    (p.name.toLowerCase().includes(s) || p.company.toLowerCase().includes(s)) &&
    (company === "" || p.company === company)
  );

  visibleCount = 10;
  renderList();
}


// Render
function renderList(){

  let itemsToShow = filtered.slice(0, visibleCount);

  let html = "";

  itemsToShow.forEach(p=>{
    let qty = cart[p.id] || 0;

    html += `
    <div class="item">
      <b>${p.name}</b><br>
      <small>${p.company}</small><br>
      Pack: ${p.pack}<br>
      <span class="mrp">MRP ₹${p.mrp}</span><br>
      Rate ₹${p.rate}

      <div class="controls">
        <button onclick="updateQty(${p.id}, -1)">-</button>
        <span class="qty">${qty}</span>
        <button onclick="updateQty(${p.id}, 1)">+</button>
      </div>
    </div>`;
  });

  document.getElementById("list").innerHTML = html;
}


// Infinite scroll
window.addEventListener("scroll", () => {
  if((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200){
    loadMore();
  }
});


function loadMore(){
  if(visibleCount < filtered.length){
    visibleCount += loadStep;
    renderList();
  }
}


// Update qty
function updateQty(id, change){
  cart[id] = (cart[id] || 0) + change;
  if(cart[id] < 0) cart[id] = 0;

  updateCart();
  renderList();
}


// Cart summary
function updateCart(){
  let total = 0;
  let items = 0;

  for(let id in cart){
    if(cart[id] > 0){
      let p = products[id];
      total += cart[id] * p.rate;
      items += cart[id];
    }
  }

  document.getElementById("cartInfo").innerText = `${items} items | ₹${total}`;
}


// WhatsApp
function sendOrder(){

  let shop = document.getElementById("shop").value;
  let mobile = document.getElementById("mobile").value;

  if(!shop || !mobile){
    alert("Enter Shop Name & Mobile");
    return;
  }

  let message = `🧾 *Aaradhya Order*%0A`;
  message += `Shop: ${shop}%0A`;
  message += `Mobile: ${mobile}%0A%0A`;

  let total = 0;

  for(let id in cart){
    if(cart[id] > 0){
      let p = products[id];
      let amt = cart[id] * p.rate;
      total += amt;
      message += `• ${p.name} (${p.pack}) x ${cart[id]} = ₹${amt} (MRP ₹${p.mrp})%0A`;
    }
  }

  message += `%0A*Total: ₹${total}*`;

  window.open("https://wa.me/919533762508?text=" + message);
}

</script></body>
</html>
