<!DOCTYPE html><html lang="en" data-theme="pharma">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaradhya Pharmaceuticals</title><style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* 🔔 TOP STRIP */
.top-strip{
  position:sticky;top:0;z-index:999;
  background:#ffcc00;color:#000;
  font-weight:bold;font-size:13px;
  padding:6px 0;overflow:hidden;
}
.top-strip span{
  display:inline-block;
  white-space:nowrap;
  padding-left:100%;
  animation:scrollText 12s linear infinite;
}
@keyframes scrollText{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}

/* HEADER */
.header{padding:12px;background:#0a3d6b;color:#fff;position:sticky;top:32px;z-index:10}
input,button,select{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
.item{background:#fff;margin:10px;padding:12px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.controls{display:flex;justify-content:space-between;margin-top:8px}
.qty{font-weight:bold}
.cart-bar{position:fixed;bottom:0;width:100%;background:#28a745;color:#fff;padding:12px;display:flex;justify-content:space-between}
.theme-btn{background:#fff;color:#000;font-weight:bold}
</style></head><body><!-- 🔔 TOP ANNOUNCEMENT --><div class="top-strip">
  <span id="topText">Loading updates...</span>
</div><div class="header">
<h3 id="brandIcon">💊 Aaradhya Pharmaceuticals</h3><button class="theme-btn" onclick="openThemeSheet()">🎨 Theme</button>

<input id="shop" placeholder="Shop Name">
<input id="mobile" placeholder="Mobile"><input id="search" placeholder="Search..." oninput="filterItems()"><select id="companyFilter" onchange="filterItems()">
<option value="">All Companies</option>
</select>
</div><div id="list">Loading...</div>
<div id="load-more-trigger"></div><div class="cart-bar">
<div id="cartInfo">0 items | ₹0</div>
<button onclick="sendOrder()">Checkout</button>
</div><!-- THEME PANEL --><div id="themeSheet" style="position:fixed;bottom:0;width:100%;background:#fff;padding:10px;display:none">
<button onclick="applyTheme('pharma')">Pharma</button>
<button onclick="applyTheme('darknight')">Dark</button>
<button onclick="applyTheme('jungle')">Jungle</button>
<button onclick="applyTheme('avengers')">Avengers</button>
<button onclick="applyTheme('indian')">Indian</button>
<button onclick="closeThemeSheet()">Close</button>
</div><script>

// ── THEME ──
const THEMES={
 pharma:{icon:'💊',search:'Search medicines…'},
 darknight:{icon:'🦇',search:'Search…'},
 jungle:{icon:'🌿',search:'Search…'},
 avengers:{icon:'⚡',search:'Search…'},
 indian:{icon:'🇮🇳',search:'Search…'}
};

let currentTheme=localStorage.getItem('aa_theme')||'pharma';

function applyTheme(t){
 currentTheme=t;
 localStorage.setItem('aa_theme',t);
 document.documentElement.setAttribute('data-theme',t);
 document.getElementById("brandIcon").innerText=THEMES[t].icon+" Aaradhya Pharmaceuticals";
 document.getElementById("search").placeholder=THEMES[t].search;
 closeThemeSheet();
}

function openThemeSheet(){document.getElementById("themeSheet").style.display="block";}
function closeThemeSheet(){document.getElementById("themeSheet").style.display="none";}
applyTheme(currentTheme);

// ── DATA ──
let products=[],filtered=[],cart={};
let visible=10,step=10;

const CSV="https://docs.google.com/spreadsheets/d/1OlY-BMsluyLrGD1lpv9dKa2rRKFhl1Q9/export?format=csv";

// CSV PARSER
function parseCSV(text){
 let rows=[],row=[],col="",q=false;
 for(let c of text){
  if(c=='"') q=!q;
  else if(c==','&&!q){row.push(col);col="";}
  else if((c=='\n'||c=='\r')&&!q){if(col||row.length){row.push(col);rows.push(row);row=[];col="";}}
  else col+=c;
 }
 if(col) row.push(col);
 if(row.length) rows.push(row);
 return rows;
}

// LOAD DATA
fetch(CSV)
.then(r=>r.text())
.then(txt=>{
 let rows=parseCSV(txt);

 // 🔔 ANNOUNCEMENT (COLUMN G)
 if(rows[1] && rows[1][6]){
  document.getElementById("topText").innerText=rows[1][6];
 }

 products=rows.slice(1).map((r,i)=>({
  id:i,
  name:(r[0]||"").trim(),
  pack:(r[1]||"").trim(),
  mrp:parseFloat(r[3])||0,
  rate:parseFloat(r[4])||0,
  company:(r[5]||"").trim()
 })).filter(p=>p.name);

 filtered=products;
 buildCompany();
 render(true);
})
.catch(()=>document.getElementById("list").innerHTML="Failed to load");

// COMPANY FILTER
function buildCompany(){
 let set=[...new Set(products.map(p=>p.company))];
 let sel=document.getElementById("companyFilter");
 set.forEach(c=>{
  let o=document.createElement("option");
  o.value=c;o.textContent=c;
  sel.appendChild(o);
 });
}

// FILTER
function filterItems(){
 let s=document.getElementById("search").value.toLowerCase();
 let c=document.getElementById("companyFilter").value;

 filtered=products.filter(p=>
  (!c||p.company===c)&&
  (!s||p.name.toLowerCase().includes(s)||p.company.toLowerCase().includes(s))
 );

 visible=10;
 render(true);
}

// RENDER
function render(reset=false){
 let list=document.getElementById("list");
 let data=filtered.slice(0,visible);

 if(reset) list.innerHTML="";

 data.forEach(p=>{
  if(document.getElementById("card-"+p.id)) return;

  let qty=cart[p.id]||0;

  let d=document.createElement("div");
  d.className="item";
  d.id="card-"+p.id;

  d.innerHTML=`
  <b>${p.name}</b><br>
  <small>${p.company}</small><br>
  Pack: ${p.pack}<br>
  MRP ₹${p.mrp}<br>
  Rate ₹${p.rate}
  <div class="controls">${controls(p.id,qty)}</div>
  `;

  list.appendChild(d);
 });
}

// CONTROLS
function controls(id,qty){
 if(qty==0) return `<button onclick="update(${id},1)">Add</button>`;
 return `
 <button onclick="update(${id},-1)">-</button>
 <span class="qty">${qty}</span>
 <button onclick="update(${id},1)">+</button>`;
}

// CART
function update(id,chg){
 cart[id]=(cart[id]||0)+chg;
 if(cart[id]<0) cart[id]=0;

 document.querySelector(`#card-${id} .controls`).innerHTML=controls(id,cart[id]);
 updateCart();
}

function updateCart(){
 let t=0,i=0;
 for(let id in cart){
  if(cart[id]>0){
   t+=cart[id]*products[id].rate;
   i+=cart[id];
  }
 }
 document.getElementById("cartInfo").innerText=`${i} items | ₹${t}`;
}

// INFINITE SCROLL
const obs=new IntersectionObserver(e=>{
 if(e[0].isIntersecting){
  visible+=step;
  render(false);
 }
},{rootMargin:"200px"});

obs.observe(document.getElementById("load-more-trigger"));

// WHATSAPP
function sendOrder(){
 let shop=document.getElementById("shop").value;
 let mob=document.getElementById("mobile").value;

 if(!shop||!mob){alert("Enter details");return;}

 let msg=`🧾 Order%0A${shop}%0A${mob}%0A%0A`;
 let total=0;

 for(let id in cart){
  if(cart[id]>0){
   let p=products[id];
   let amt=cart[id]*p.rate;
   total+=amt;
   msg+=`${p.name} x ${cart[id]} = ₹${amt}%0A`;
  }
 }

 msg+=`Total ₹${total}`;
 window.open("https://wa.me/919533762508?text="+msg);
}

</script></body>
</html>
