<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aaradhya Order App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1a7a4a;
    --green-light: #e8f5ee;
    --green-mid: #2da05e;
    --accent: #f0a500;
    --bg: #f7f8f6;
    --card: #ffffff;
    --text: #1c1c1e;
    --muted: #6e7370;
    --border: #e4e8e4;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --header-h: 180px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 90px;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--card);
    padding: 14px 16px 12px;
    box-shadow: 0 1px 0 var(--border), var(--shadow);
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .brand-icon {
    width: 38px;
    height: 38px;
    background: var(--green);
    border-radius: 10px;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }

  .brand-icon svg { width: 20px; height: 20px; fill: white; }

  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--green);
    line-height: 1.1;
  }

  .brand-sub {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  /* Input row */
  .inputs-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .field {
    position: relative;
  }

  .field input, .field select {
    width: 100%;
    padding: 10px 12px 10px 36px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .field input:focus, .field select:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(26,122,74,0.1);
    background: white;
  }

  .field-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    font-size: 15px;
  }

  /* Search + filter row */
  .search-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
  }

  .search-wrap input {
    width: 100%;
    padding: 10px 12px 10px 38px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .search-wrap input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(26,122,74,0.1);
    background: white;
  }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  .filter-btn {
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    transition: all 0.2s;
    -webkit-appearance: none;
  }

  .filter-btn.active {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
    font-weight: 600;
  }

  /* Filter sheet */
  .filter-sheet {
    position: fixed;
    inset: 0;
    z-index: 200;
    pointer-events: none;
  }

  .filter-sheet.open { pointer-events: all; }

  .filter-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0);
    transition: background 0.3s;
  }

  .filter-sheet.open .filter-backdrop { background: rgba(0,0,0,0.4); }

  .filter-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px 16px 32px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 70vh;
    overflow-y: auto;
  }

  .filter-sheet.open .filter-panel { transform: translateY(0); }

  .filter-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .filter-title {
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 12px;
    color: var(--text);
  }

  .company-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .company-chip {
    padding: 7px 14px;
    border: 1.5px solid var(--border);
    border-radius: 50px;
    font-size: 13px;
    cursor: pointer;
    background: var(--bg);
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  .company-chip.selected {
    background: var(--green);
    border-color: var(--green);
    color: white;
    font-weight: 500;
  }

  /* ── PRODUCT LIST ── */
  #list {
    padding: 12px 12px 0;
    display: grid;
    gap: 10px;
  }

  @media (min-width: 600px) { #list { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 900px) { #list { grid-template-columns: repeat(3, 1fr); } }

  /* ── PRODUCT CARD ── */
  .item {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: transform 0.15s, box-shadow 0.15s;
    animation: fadeUp 0.3s ease both;
    will-change: transform;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .item.in-cart {
    border-color: var(--green);
    box-shadow: 0 0 0 2px rgba(26,122,74,0.12), var(--shadow);
  }

  .item-name {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    color: var(--text);
  }

  .item-company {
    font-size: 12px;
    color: var(--green);
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .item-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 4px;
  }

  .price-block {}

  .price-rate {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .price-mrp {
    font-size: 12px;
    color: var(--muted);
    text-decoration: line-through;
  }

  .pack-badge {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  /* ── QTY CONTROLS ── */
  .controls {
    display: flex;
    align-items: center;
    margin-top: 8px;
  }

  .add-btn {
    width: 100%;
    padding: 10px;
    background: var(--green-light);
    color: var(--green);
    border: 1.5px solid rgba(26,122,74,0.2);
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .add-btn:active { transform: scale(0.97); background: var(--green); color: white; }

  .qty-control {
    display: flex;
    align-items: center;
    width: 100%;
    background: var(--green-light);
    border-radius: 10px;
    overflow: hidden;
    border: 1.5px solid rgba(26,122,74,0.2);
  }

  .qty-btn {
    width: 44px;
    height: 42px;
    background: none;
    border: none;
    font-size: 20px;
    font-weight: 300;
    color: var(--green);
    cursor: pointer;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .qty-btn:active { background: rgba(26,122,74,0.2); }

  .qty-num {
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 16px;
    color: var(--green);
  }

  /* ── EMPTY / LOADING ── */
  .state-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    grid-column: 1 / -1;
  }

  .state-msg .icon { font-size: 40px; margin-bottom: 12px; }
  .state-msg p { font-size: 15px; }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── CART BAR ── */
  .cart-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 10px 16px max(10px, env(safe-area-inset-bottom));
    background: white;
    box-shadow: 0 -1px 0 var(--border), 0 -4px 20px rgba(0,0,0,0.08);
  }

  .cart-inner {
    background: var(--green);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 16px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(26,122,74,0.35);
  }

  .cart-inner:active { transform: scale(0.98); }

  .cart-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cart-badge {
    background: white;
    color: var(--green);
    font-size: 13px;
    font-weight: 700;
    border-radius: 8px;
    padding: 4px 10px;
    min-width: 32px;
    text-align: center;
  }

  .cart-label {
    color: white;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.9;
  }

  .cart-total {
    color: white;
    font-size: 16px;
    font-weight: 700;
  }

  .cart-arrow {
    color: white;
    font-size: 18px;
    opacity: 0.8;
    margin-left: 6px;
  }

  /* Hidden cart bar when empty */
  .cart-bar.hidden .cart-inner {
    background: #bbb;
    box-shadow: none;
    pointer-events: none;
  }

  /* ── CHECKOUT SHEET ── */
  .checkout-sheet {
    position: fixed;
    inset: 0;
    z-index: 300;
    pointer-events: none;
  }

  .checkout-sheet.open { pointer-events: all; }

  .checkout-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0);
    transition: background 0.3s;
  }

  .checkout-sheet.open .checkout-backdrop { background: rgba(0,0,0,0.5); }

  .checkout-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-radius: 24px 24px 0 0;
    padding: 20px 16px max(24px, env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 85vh;
    overflow-y: auto;
  }

  .checkout-sheet.open .checkout-panel { transform: translateY(0); }

  .checkout-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .checkout-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--text);
    margin-bottom: 16px;
  }

  .checkout-items {
    margin-bottom: 16px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .checkout-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }

  .checkout-item-name {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
    flex: 1;
  }

  .checkout-item-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .checkout-item-price {
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
  }

  .checkout-total-row {
    display: flex;
    justify-content: space-between;
    font-size: 17px;
    font-weight: 700;
    padding: 12px 0;
    border-top: 2px solid var(--text);
    margin-bottom: 16px;
  }

  .wa-btn {
    width: 100%;
    padding: 15px;
    background: #25D366;
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(37,211,102,0.35);
    -webkit-tap-highlight-color: transparent;
  }

  .wa-btn:active { transform: scale(0.97); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--text);
    color: white;
    padding: 10px 18px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── RESULTS COUNT ── */
  .results-bar {
    padding: 10px 14px 4px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  /* ── LOAD MORE ── */
  #load-more-trigger {
    height: 40px;
    margin: 8px 0 16px;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/><path d="M0 0h24v24H0z" fill="none"/></svg>
    </div>
    <div>
      <div class="brand-name">Aaradhya</div>
      <div class="brand-sub">Pharmaceuticals · Order Portal</div>
    </div>
  </div>

  <div class="inputs-row">
    <div class="field">
      <span class="field-icon">🏪</span>
      <input type="text" id="shop" placeholder="Shop Name" autocomplete="off">
    </div>
    <div class="field">
      <span class="field-icon">📱</span>
      <input type="tel" id="mobile" placeholder="Mobile No." autocomplete="off" inputmode="numeric">
    </div>
  </div>

  <div class="search-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="search" placeholder="Search medicines…" oninput="filterItems()" autocomplete="off">
    </div>
    <button class="filter-btn" id="filterToggle" onclick="toggleFilterSheet()">
      ⚗️ Filter
    </button>
  </div>
</div>

<!-- FILTER SHEET -->
<div class="filter-sheet" id="filterSheet">
  <div class="filter-backdrop" onclick="toggleFilterSheet()"></div>
  <div class="filter-panel">
    <div class="filter-handle"></div>
    <div class="filter-title">Filter by Company</div>
    <div class="company-list" id="companyList"></div>
  </div>
</div>

<!-- RESULTS COUNT -->
<div class="results-bar" id="resultsBar"></div>

<!-- PRODUCT LIST -->
<div id="list">
  <div class="state-msg">
    <div class="spinner"></div>
    <p>Loading products…</p>
  </div>
</div>
<div id="load-more-trigger"></div>

<!-- CART BAR -->
<div class="cart-bar hidden" id="cartBar">
  <div class="cart-inner" onclick="openCheckout()">
    <div class="cart-left">
      <div class="cart-badge" id="cartCount">0</div>
      <div class="cart-label">items in cart</div>
    </div>
    <div style="display:flex;align-items:center">
      <div class="cart-total" id="cartTotal">₹0</div>
      <div class="cart-arrow">›</div>
    </div>
  </div>
</div>

<!-- CHECKOUT SHEET -->
<div class="checkout-sheet" id="checkoutSheet">
  <div class="checkout-backdrop" onclick="closeCheckout()"></div>
  <div class="checkout-panel">
    <div class="checkout-handle"></div>
    <div class="checkout-title">Your Order</div>
    <div class="checkout-items" id="checkoutItems"></div>
    <div class="checkout-total-row">
      <span>Total</span>
      <span id="checkoutTotal">₹0</span>
    </div>
    <button class="wa-btn" onclick="sendOrder()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Send via WhatsApp
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let products = [];
let filtered = [];
let cart = {};
let visibleCount = 12;
let selectedCompany = "";
const loadStep = 12;
const CSV_URL = "https://docs.google.com/spreadsheets/d/1OlY-BMsluyLrGD1lpv9dKa2rRKFhl1Q9/export?format=csv";

// ── FETCH DATA ──
fetch(CSV_URL)
  .then(r => r.text())
  .then(csv => {
    const rows = csv.trim().split("\n").map(r => {
      // Handle quoted CSV fields
      const result = [];
      let cur = "", inQ = false;
      for (let ch of r) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ""; }
        else { cur += ch; }
      }
      result.push(cur.trim());
      return result;
    });

    products = rows.slice(1).map((r, i) => ({
      id: i,
      name: (r[0] || "").trim(),
      pack: (r[1] || "").trim(),
      mrp: parseFloat(r[3]) || 0,
      rate: parseFloat(r[4]) || 0,
      company: (r[5] || "").trim()
    })).filter(p => p.name !== "");

    filtered = products;
    buildCompanyChips();
    renderList(true);
    updateResultsBar();
  })
  .catch(() => {
    document.getElementById("list").innerHTML = `<div class="state-msg"><div class="icon">⚠️</div><p>Failed to load. Check connection.</p></div>`;
  });

// ── COMPANY CHIPS ──
function buildCompanyChips() {
  const companies = [...new Set(products.map(p => p.company))].sort();
  const container = document.getElementById("companyList");
  container.innerHTML = "";

  const allChip = document.createElement("div");
  allChip.className = "company-chip selected";
  allChip.textContent = "All Companies";
  allChip.onclick = () => selectCompany("", allChip);
  container.appendChild(allChip);

  companies.forEach(c => {
    const chip = document.createElement("div");
    chip.className = "company-chip";
    chip.textContent = c;
    chip.onclick = () => selectCompany(c, chip);
    container.appendChild(chip);
  });
}

function selectCompany(company, chipEl) {
  selectedCompany = company;
  document.querySelectorAll(".company-chip").forEach(c => c.classList.remove("selected"));
  chipEl.classList.add("selected");

  const btn = document.getElementById("filterToggle");
  btn.classList.toggle("active", company !== "");
  btn.textContent = company ? `✓ ${company.slice(0,10)}` : "⚗️ Filter";

  toggleFilterSheet();
  filterItems();
}

// ── FILTER ──
function filterItems() {
  const s = document.getElementById("search").value.toLowerCase().trim();

  filtered = products.filter(p =>
    (selectedCompany === "" || p.company === selectedCompany) &&
    (!s || p.name.toLowerCase().includes(s) || p.company.toLowerCase().includes(s) || p.pack.toLowerCase().includes(s))
  );

  visibleCount = loadStep;
  renderList(true);
  updateResultsBar();
}

function updateResultsBar() {
  const bar = document.getElementById("resultsBar");
  bar.textContent = filtered.length
    ? `${filtered.length} product${filtered.length !== 1 ? 's' : ''} found`
    : "";
}

// ── RENDER ──
// Track rendered items to avoid full re-render on qty change
const itemStates = {}; // id -> {qty, el}

function renderList(reset = false) {
  const container = document.getElementById("list");
  const toShow = filtered.slice(0, visibleCount);

  if (toShow.length === 0) {
    container.innerHTML = `<div class="state-msg"><div class="icon">🔍</div><p>No products found</p></div>`;
    return;
  }

  // Full re-render (on filter change)
  if (reset) {
    container.innerHTML = "";
    toShow.forEach((p, i) => {
      const el = createCard(p, i);
      container.appendChild(el);
    });
    return;
  }

  // Append only new items (infinite scroll)
  const existingCount = container.querySelectorAll(".item").length;
  toShow.slice(existingCount).forEach((p, i) => {
    const el = createCard(p, existingCount + i);
    container.appendChild(el);
  });
}

function createCard(p, animIndex) {
  const qty = cart[p.id] || 0;
  const div = document.createElement("div");
  div.className = `item${qty > 0 ? " in-cart" : ""}`;
  div.id = `card-${p.id}`;
  div.style.animationDelay = `${Math.min(animIndex * 30, 200)}ms`;

  div.innerHTML = `
    <div class="item-company">${escHtml(p.company)}</div>
    <div class="item-name">${escHtml(p.name)}</div>
    <div class="item-meta">
      <div class="price-block">
        <div class="price-rate">₹${p.rate.toFixed(2)}</div>
        <div class="price-mrp">MRP ₹${p.mrp.toFixed(2)}</div>
      </div>
      <div class="pack-badge">${escHtml(p.pack)}</div>
    </div>
    <div class="controls" id="ctrl-${p.id}">${renderControls(p.id, qty)}</div>
  `;

  return div;
}

function renderControls(id, qty) {
  if (qty === 0) {
    return `<button class="add-btn" onclick="updateQty(${id},1)" ontouchstart="">+ Add</button>`;
  }
  return `
    <div class="qty-control">
      <button class="qty-btn" onclick="updateQty(${id},-1)" ontouchstart="">−</button>
      <span class="qty-num">${qty}</span>
      <button class="qty-btn" onclick="updateQty(${id},1)" ontouchstart="">+</button>
    </div>`;
}

// ── UPDATE QTY ──
function updateQty(id, change) {
  const prev = cart[id] || 0;
  cart[id] = Math.max(0, prev + change);

  // Patch only the control area + border (no full re-render)
  const ctrl = document.getElementById(`ctrl-${id}`);
  if (ctrl) ctrl.innerHTML = renderControls(id, cart[id]);

  const card = document.getElementById(`card-${id}`);
  if (card) card.classList.toggle("in-cart", cart[id] > 0);

  updateCartBar();

  if (change > 0 && prev === 0) showToast("Added to cart ✓");
}

// ── CART BAR ──
function updateCartBar() {
  let total = 0, items = 0;
  for (const id in cart) {
    if (cart[id] > 0) {
      total += cart[id] * products[id].rate;
      items += cart[id];
    }
  }

  document.getElementById("cartCount").textContent = items;
  document.getElementById("cartTotal").textContent = `₹${total.toFixed(0)}`;
  document.getElementById("cartBar").classList.toggle("hidden", items === 0);
}

// ── CHECKOUT ──
function openCheckout() {
  const items = Object.entries(cart).filter(([,q]) => q > 0);
  if (items.length === 0) return;

  let html = "";
  let total = 0;

  items.forEach(([id, qty]) => {
    const p = products[id];
    const amt = qty * p.rate;
    total += amt;
    html += `
      <div class="checkout-item">
        <div>
          <div class="checkout-item-name">${escHtml(p.name)}</div>
          <div class="checkout-item-sub">${escHtml(p.company)} · ${escHtml(p.pack)} · qty ${qty}</div>
        </div>
        <div class="checkout-item-price">₹${amt.toFixed(0)}</div>
      </div>`;
  });

  document.getElementById("checkoutItems").innerHTML = html;
  document.getElementById("checkoutTotal").textContent = `₹${total.toFixed(0)}`;
  document.getElementById("checkoutSheet").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeCheckout() {
  document.getElementById("checkoutSheet").classList.remove("open");
  document.body.style.overflow = "";
}

// ── WHATSAPP ──
function sendOrder() {
  const shop = document.getElementById("shop").value.trim();
  const mobile = document.getElementById("mobile").value.trim();

  if (!shop || !mobile) {
    showToast("⚠️ Enter shop name & mobile");
    return;
  }

  const items = Object.entries(cart).filter(([,q]) => q > 0);
  if (items.length === 0) { showToast("Cart is empty"); return; }

  let msg = `🧾 *Aaradhya Pharmaceuticals Order*%0A`;
  msg += `🏪 Shop: ${enc(shop)}%0A`;
  msg += `📱 Mobile: ${enc(mobile)}%0A%0A`;

  let total = 0;
  items.forEach(([id, qty]) => {
    const p = products[id];
    const amt = qty * p.rate;
    total += amt;
    msg += `• ${enc(p.name)} (${enc(p.pack)}) × ${qty} = ₹${amt.toFixed(0)}%0A`;
  });

  msg += `%0A*Total: ₹${total.toFixed(0)}*`;

  closeCheckout();
  window.open(`https://wa.me/919533762508?text=${msg}`);
}

// ── FILTER SHEET ──
function toggleFilterSheet() {
  document.getElementById("filterSheet").classList.toggle("open");
}

// ── INFINITE SCROLL (IntersectionObserver) ──
const observer = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting && visibleCount < filtered.length) {
    visibleCount += loadStep;
    renderList(false);
    updateResultsBar();
  }
}, { rootMargin: "200px" });

observer.observe(document.getElementById("load-more-trigger"));

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2000);
}

// ── HELPERS ──
function escHtml(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function enc(str) {
  return encodeURIComponent(str);
}

// Close filter sheet on backdrop click is handled inline
// Prevent accidental double-tap zoom on buttons
document.addEventListener("dblclick", e => { if (e.target.tagName === "BUTTON") e.preventDefault(); });
</script>
