<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaradhya Order App</title><style>
body { font-family: Arial; padding: 10px; background: #f5f5f5; }
h2 { text-align: center; }
input, button {
  padding: 12px;
  margin: 5px 0;
  width: 100%;
  border-radius: 8px;
  border: 1px solid #ccc;
}
.item {
  background: white;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 10px;
}
.total {
  font-size: 18px;
  font-weight: bold;
  text-align: right;
}
button {
  background: #28a745;
  color: white;
  font-size: 16px;
}
</style></head>
<body><h2>Aaradhya Pharmaceuticals</h2><input type="text" id="shop" placeholder="Enter Shop Name" required>
<input type="text" id="mobile" placeholder="Enter Mobile Number" required><input type="text" id="search" placeholder="Search Product..." onkeyup="filterItems()"><div id="list">Loading products...</div><div class="total" id="total">Total: ₹0</div><button onclick="sendOrder()">Place Order on WhatsApp</button>

<script>

let products = [];
let filtered = [];

// ✅ DIRECT CSV LINK (NO API ISSUES)
const CSV_URL = "https://docs.google.com/spreadsheets/d/1OlY-BMsluyLrGD1lpv9dKa2rRKFhl1Q9/export?format=csv";

// 🔥 FETCH CSV
fetch(CSV_URL)
.then(res => res.text())
.then(csv => {

  const rows = csv.split("\n").map(r => r.split(","));

  const headers = rows[0];

  products = rows.slice(1).map(r => ({
    name: (r[0] || "").trim(),
    pack: (r[1] || "").trim(),
    rate: parseFloat(r[4]) || 0,
    company: (r[5] || "").trim()
  }))
  .filter(p => p.name !== "");

  filtered = products;
  renderList();
})
.catch(err => {
  document.getElementById("list").innerHTML = "❌ Failed to load products";
  console.error(err);
});


// 🧾 DISPLAY
function renderList(){
  let html = "";
  filtered.forEach((p,i)=>{
    html += `
    <div class="item">
      <b>${p.name}</b><br>
      <small>${p.company}</small><br>
      Pack: ${p.pack}<br>
      Rate: ₹${p.rate}<br>
      Qty: <input type="number" id="qty${i}" min="0" onchange="updateTotal()">
    </div>`;
  });
  document.getElementById("list").innerHTML = html;
}


// 🔍 SEARCH
function filterItems(){
  let s = document.getElementById("search").value.toLowerCase();
  filtered = products.filter(p =>
    p.name.toLowerCase().includes(s) ||
    p.company.toLowerCase().includes(s)
  );
  renderList();
}


// 💰 TOTAL
function updateTotal(){
  let total = 0;
  filtered.forEach((p,i)=>{
    let qty = parseFloat(document.getElementById("qty"+i)?.value) || 0;
    total += qty * p.rate;
  });
  document.getElementById("total").innerText = "Total: ₹" + total.toFixed(2);
}


// 📲 WHATSAPP ORDER
function sendOrder(){

  let shop = document.getElementById("shop").value;
  let mobile = document.getElementById("mobile").value;

  if(!shop || !mobile){
    alert("Enter Shop Name & Mobile");
    return;
  }

  let message = `🧾 *Aaradhya Order*%0A`;
  message += `Shop: ${shop}%0A`;
  message += `Mobile: ${mobile}%0A%0A`;

  let total = 0;

  filtered.forEach((p,i)=>{
    let qty = parseFloat(document.getElementById("qty"+i)?.value) || 0;
    if(qty > 0){
      let amt = qty * p.rate;
      total += amt;
      message += `• ${p.name} (${p.pack}) x ${qty} = ₹${amt}%0A`;
    }
  });

  message += `%0A*Total: ₹${total.toFixed(2)}*`;

  window.open("https://wa.me/919533762508?text=" + message);
}

</script></body>
</html>
